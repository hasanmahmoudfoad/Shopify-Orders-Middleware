<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopify Order Monitor</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="toast-region" class="toast-region" aria-live="polite"></div>
    <main class="page-shell">
      <header class="page-heading">
        <div>
          <p class="eyebrow">Shopify middleware</p>
          <h1>Order Monitor</h1>
          <p class="muted">Webhook-driven orders and fulfillment workflow.</p>
        </div>
        <div class="stat-card">
          <span>Total orders</span>
          <strong id="order-count">—</strong>
        </div>
      </header>

      <section class="card">
        <div class="card-heading">
          <div><h2>Latest orders</h2><p class="muted">Automatically refreshes every five seconds.</p></div>
          <div class="actions">
            <button id="prev-orders" class="btn btn-small">Previous</button>
            <button id="next-orders" class="btn btn-small">Next</button>
            <button id="refresh-orders" class="btn btn-small">Refresh</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="orders-table">
            <thead>
              <tr>
                <th>Order</th>
                <th>Customer</th>
                <th>Email</th>
                <th>Total</th>
                <th>Created</th>
                <th>Order</th>
                <th>Financial</th>
                <th>Fulfillment</th>
                <th>Delivery</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="10" class="empty-state">Loading orders…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="dialog-backdrop" class="dialog-backdrop" hidden>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
        <div class="dialog-header">
          <div><h2 id="dialog-title"></h2><p id="dialog-description" class="muted"></p></div>
          <button id="dialog-close" class="icon-btn" aria-label="Close">×</button>
        </div>
        <div id="dialog-body" class="dialog-body"></div>
        <p id="dialog-message" class="form-message"></p>
        <div class="dialog-footer">
          <button id="dialog-cancel" class="btn">Cancel</button>
          <button id="dialog-confirm" class="btn btn-primary">Save</button>
        </div>
      </section>
    </div>
    <script src="/dashboard.js"></script>
  </body>
</html>
